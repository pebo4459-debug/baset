<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="description" content="نظام الإدارة الفضائي: أفضل برنامج سحابي مجاني لإدارة المخازن، المبيعات، الأرباح والمرتجعات. سجل الآن وتابع بضاعتك من أي مكان.">
<meta name="keywords" content="برنامج إدارة مخازن, سيستم مبيعات مجاني, جرد المخزون, برنامج كاشير, نظام محاسبي سحابي, Baset Store">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الإدارة الفضائي | برنامج إدارة مخازن ومبيعات سحابي</title>    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* ================== الخلفية والنجوم ================== */
        body {
            margin: 0; padding: 20px; font-family: 'Courier New', Courier, monospace;
            color: #00f3ff; min-height: 100vh; background-color: #02060d;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #e2f0ff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 90px 40px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 200px 200px, 350px 350px, 500px 500px;
            animation: moveStars 40s linear infinite;
        }
        @keyframes moveStars { 0% { background-position: 0 0, 0 0, 0 0; } 100% { background-position: -500px -500px, -700px -700px, -1000px -1000px; } }

        /* ================== الحاوية الزجاجية ================== */
        .hud-container {
            max-width: 1200px; margin: auto; background: rgba(4, 13, 33, 0.6);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 2px solid #00f3ff; border-radius: 15px; padding: 30px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.1);
            position: relative; z-index: 10;
        }
        h1 { text-align: center; text-shadow: 0 0 15px #00f3ff; letter-spacing: 2px; margin-bottom: 5px;}
        .subtitle { text-align: center; color: #bc13fe; margin-top: 0; margin-bottom: 20px; font-size: 14px;}

        /* ================== شاشة تسجيل الدخول ================== */
        .auth-box { max-width: 400px; margin: 50px auto; text-align: center; }
        .auth-input {
            width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 15px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid #00f3ff; color: #fff;
            border-radius: 8px; outline: none; font-size: 16px;
        }
        .toggle-link { display: block; margin-top: 15px; color: #bc13fe; cursor: pointer; text-decoration: underline; }

        /* ================== المؤشرات والجدول ================== */
        .dashboard { display: flex; gap: 20px; margin-bottom: 25px; }
        .card { flex: 1; background: rgba(0, 243, 255, 0.05); border: 1px solid #00f3ff; border-radius: 8px; padding: 15px; text-align: center; }
        .card h3 { margin: 0 0 10px 0; color: #fff; font-size: 16px; }
        .card h2 { margin: 0; font-size: 28px; text-shadow: 0 0 10px currentcolor; }
        .card.profit { color: #00ff9d; border-color: #00ff9d; }
        .card.bestseller { color: #bc13fe; border-color: #bc13fe; }

        form { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .data-input { flex: 1; min-width: 130px; padding: 12px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00f3ff; color: #fff; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0, 0, 0, 0.5); }
        th { color: #fff; padding: 15px; border-bottom: 2px solid #00f3ff; font-size: 14px;}
        td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(0, 243, 255, 0.2); }

        /* ================== الأزرار وتأثير البرق ================== */
        .btn { padding: 8px 10px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; font-weight: bold; background: rgba(0,0,0,0.5); font-size: 13px; color: #fff; transition: all 0.2s;}
        .btn-main { border-color: #00f3ff; color: #00f3ff; width: 100%; padding: 12px; font-size: 16px; margin-top: 10px;}
        .btn-add { border-color: #00ff9d; color: #00ff9d; }
        .btn-sell { border-color: #00f3ff; color: #00f3ff; }
        .btn-return { border-color: #bc13fe; color: #bc13fe; }
        .btn-delete { border-color: #ff003c; color: #ff003c; }
        .btn-logout { border-color: #ff003c; color: #ff003c; float: left; margin-top: -40px;}
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 280px; margin: auto; }

        .flash-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; pointer-events: none; z-index: 9999; }
        @keyframes screenLightning { 10% { background: rgba(255, 255, 255, 0.6); } 30% { background: rgba(0, 243, 255, 0.4); } }
        .lightning-screen { animation: screenLightning 0.4s ease-out; }
        @keyframes btnLightning { 10% { transform: scale(1.15) skewX(-10deg); box-shadow: 0 0 80px #00f3ff; background: #fff; color: #000; filter: brightness(3); } }
        .lightning-btn { animation: btnLightning 0.4s ease-out; }
        
        #loading { display: none; text-align: center; color: #00ff9d; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="screenFlash" class="flash-overlay"></div>

<div id="authScreen" class="hud-container">
    <h1>[ بوابة الدخول السحابية ]</h1>
    <p class="subtitle" id="authSubtitle">يرجى تسجيل الدخول للوصول إلى بياناتك السحابية</p>
    <div class="auth-box">
        <input type="text" id="authUsername" class="auth-input" placeholder="> اسم المستخدم_" required>
        <input type="password" id="authPassword" class="auth-input" placeholder="> كلمة المرور_" required>
        <button id="authBtn" class="btn btn-main" onclick="handleAuth(this)">[ تسجيل الدخول ]</button>
        <a id="toggleAuth" class="toggle-link" onclick="toggleMode()">لا تملك حساب؟ إنشاء حساب جديد</a>
    </div>
</div>

<div id="mainScreen" class="hud-container" style="display: none;">
    <h1>[ نظام الإدارة الفضائي ]</h1>
    <p class="subtitle">القائد الحالي: <span id="currentUserLabel" style="color:#00ff9d;"></span></p>
    <button class="btn btn-logout" onclick="logout(this)">[ تسجيل خروج ]</button>
    <div id="loading">جاري الاتصال بالسحابة...</div>
    
    <div class="dashboard" id="dashContent">
        <div class="card profit"><h3>إجمالي الربح الصافي</h3><h2 id="totalProfit">0</h2></div>
        <div class="card bestseller"><h3>الأكثر مبيعاً</h3><h2 id="bestSeller">جارِ البحث...</h2></div>
    </div>

    <form id="addForm">
        <input type="text" id="name" class="data-input" placeholder="> اسم المنتج_" required>
        <input type="number" id="cost" class="data-input" placeholder="> التكلفة_" required>
        <input type="number" id="retail" class="data-input" placeholder="> سعر قطاعي_" required>
        <input type="number" id="wholesale" class="data-input" placeholder="> سعر جملة_" required>
        <input type="number" id="qty" class="data-input" placeholder="> المتاح_" required>
        <button type="button" class="btn btn-add" onclick="addItem(this)">[ + إضافة للشبكة ]</button>
    </form>

    <table>
        <thead><tr><th>المنتج</th><th>المتاح</th><th>المباع (ق / ج)</th><th>الأسعار (ق / ج)</th><th>الربح</th><th>أوامر النظام</th></tr></thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>
    // ==========================================
    // تم الربط بقاعدة بياناتك بنجاح!
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDig4PfcTPQQ2rG0lGLTKpIdLYhKI2_6NA",
      authDomain: "baset-ad623.firebaseapp.com",
      databaseURL: "https://baset-ad623-default-rtdb.firebaseio.com",
      projectId: "baset-ad623",
      storageBucket: "baset-ad623.firebasestorage.app",
      messagingSenderId: "110153120661",
      appId: "1:110153120661:web:82520fe6e647da10c4d49c",
      measurementId: "G-1R4MRC8EH1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ==========================================
    // المتغيرات والبرق
    // ==========================================
    let activeUser = localStorage.getItem('spaceActiveUser'); 
    let db = []; 
    let isLoginMode = true; 

    const screenFlash = document.getElementById('screenFlash');
    function runWithLightning(btn, callback) {
        btn.classList.add('lightning-btn'); screenFlash.classList.add('lightning-screen');
        setTimeout(() => { btn.classList.remove('lightning-btn'); screenFlash.classList.remove('lightning-screen'); callback(); }, 350); 
    }

    // ==========================================
    // نظام الحسابات (متصل بالسحابة)
    // ==========================================
    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authSubtitle').innerText = isLoginMode ? "يرجى تسجيل الدخول للوصول إلى بياناتك" : "أدخل بياناتك لإنشاء حساب جديد في الشبكة";
        document.getElementById('authBtn').innerText = isLoginMode ? "[ تسجيل الدخول ]" : "[ إنشاء حساب ]";
        document.getElementById('toggleAuth').innerText = isLoginMode ? "لا تملك حساب؟ إنشاء حساب جديد" : "لديك حساب بالفعل؟ تسجيل الدخول";
    }

    function handleAuth(btn) {
        runWithLightning(btn, () => {
            let user = document.getElementById('authUsername').value.trim();
            let pass = document.getElementById('authPassword').value.trim();

            if (!user || !pass) return alert("[ خطأ: يرجى إدخال اسم المستخدم وكلمة المرور ]");

            database.ref('spaceAccounts/' + user).once('value').then((snapshot) => {
                const accountData = snapshot.val();
                
                if (isLoginMode) {
                    if (accountData && accountData.password === pass) loginSuccess(user);
                    else alert("[ خطأ: اسم المستخدم أو كلمة المرور غير صحيحة ]");
                } else {
                    if (accountData) alert("[ خطأ: اسم المستخدم موجود بالفعل، اختر اسماً آخر ]");
                    else {
                        database.ref('spaceAccounts/' + user).set({ password: pass });
                        database.ref('spaceData/' + user).set([]); 
                        alert(`[ تم إنشاء الحساب السحابي بنجاح: ${user} ]`);
                        loginSuccess(user);
                    }
                }
            });
        });
    }

    function loginSuccess(username) {
        activeUser = username;
        localStorage.setItem('spaceActiveUser', activeUser);
        document.getElementById('authUsername').value = '';
        document.getElementById('authPassword').value = '';
        checkAuthState();
    }

    function logout(btn) {
        runWithLightning(btn, () => {
            activeUser = null;
            localStorage.removeItem('spaceActiveUser');
            db = []; 
            checkAuthState();
        });
    }

    // ==========================================
    // جلب وعرض البيانات من السحابة
    // ==========================================
    function checkAuthState() {
        if (activeUser) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('currentUserLabel').innerText = activeUser;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('dashContent').style.display = 'none';

            database.ref('spaceData/' + activeUser).on('value', (snapshot) => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashContent').style.display = 'flex';
                db = snapshot.val() || [];
                render();
            });
        } else {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('mainScreen').style.display = 'none';
        }
    }

    function saveToCloud() {
        database.ref('spaceData/' + activeUser).set(db);
    }

    // ==========================================
    // أوامر البيع والإضافة والحذف
    // ==========================================
    function addItem(btn) {
        runWithLightning(btn, () => {
            let name = document.getElementById('name').value, cost = document.getElementById('cost').value, retail = document.getElementById('retail').value, wholesale = document.getElementById('wholesale').value, qty = document.getElementById('qty').value;
            if (name && cost && retail && wholesale && qty) {
                db.push({ name: name, cost: parseFloat(cost), retail: parseFloat(retail), wholesale: parseFloat(wholesale), qty: parseInt(qty), soldRetail: 0, soldWholesale: 0 });
                saveToCloud();
                document.getElementById('addForm').reset();
            } else alert("[ خطأ: يرجى ملء جميع البيانات أولاً! ]");
        });
    }

    function sell(btn, i, type) {
        runWithLightning(btn, () => {
            let q = parseInt(prompt(`> أدخل الكمية المراد بيعها (${type === 'retail' ? 'قطاعي' : 'جملة'}):`));
            if(q && q > 0 && db[i].qty >= q) {
                db[i].qty -= q;
                if (type === 'retail') db[i].soldRetail = (db[i].soldRetail || 0) + q;
                else db[i].soldWholesale = (db[i].soldWholesale || 0) + q;
                saveToCloud();
            } else if (q > db[i].qty) alert("[ خطأ: الكمية المطلوبة أكبر من المتاح! ]");
        });
    }

    function returnItem(btn, i, type) {
        runWithLightning(btn, () => {
            let typeName = type === 'retail' ? 'قطاعي' : 'جملة';
            let soldAmount = type === 'retail' ? (db[i].soldRetail || 0) : (db[i].soldWholesale || 0);
            if (soldAmount === 0) return alert(`[ النظام: لم يتم بيع أي كمية (${typeName}) لعمل مرتجع! ]`);
            let q = parseInt(prompt(`> أقصى كمية يمكن إرجاعها (${typeName}): ${soldAmount}\n> أدخل كمية المرتجع العائدة للمخزن:`));
            if(q && q > 0 && q <= soldAmount) {
                db[i].qty += q; 
                if (type === 'retail') db[i].soldRetail -= q; else db[i].soldWholesale -= q;
                saveToCloud();
            } else if (q > soldAmount) alert(`[ خطأ: الكمية المرتجعة أكبر من المباع (${typeName})! ]`);
        });
    }

    function deleteItem(btn, i) {
        runWithLightning(btn, () => {
            if(confirm("[ تحذير: تأكيد مسح المنتج من السحابة؟ ]")) { db.splice(i, 1); saveToCloud(); }
        });
    }

    function render() {
        const list = document.getElementById('list'); list.innerHTML = '';
        let totalProfit = 0, bestItem = "لا يوجد", maxSold = 0;

        if (!db || db.length === 0) return; // لو مفيش داتا

        db.forEach((item, i) => {
            let soldR = item.soldRetail || 0, soldW = item.soldWholesale || 0;
            let itemProfit = (soldR * (item.retail - item.cost)) + (soldW * (item.wholesale - item.cost));
            totalProfit += itemProfit;
            let totalSold = soldR + soldW;
            if (totalSold > maxSold) { maxSold = totalSold; bestItem = item.name; }

            list.innerHTML += `<tr>
                <td style="color:#fff; font-weight:bold;">${item.name}</td>
                <td style="font-size: 1.2em; color: #00ff9d; font-weight:bold;">${item.qty}</td>
                <td style="color: #f39c12; font-weight:bold;">${soldR} / ${soldW}</td>
                <td>${item.retail} / ${item.wholesale}</td>
                <td style="color:#bc13fe; font-weight:bold;">${itemProfit} ج.م</td>
                <td>
                    <div class="btn-group">
                        <button class="btn btn-sell" onclick="sell(this, ${i}, 'retail')">بيع ق</button>
                        <button class="btn btn-sell" onclick="sell(this, ${i}, 'wholesale')">بيع ج</button>
                        <button class="btn btn-return" onclick="returnItem(this, ${i}, 'retail')">رجع ق</button>
                        <button class="btn btn-return" onclick="returnItem(this, ${i}, 'wholesale')">رجع ج</button>
                        <button class="btn btn-delete" onclick="deleteItem(this, ${i})">حذف</button>
                    </div>
                </td>
            </tr>`;
        });
        document.getElementById('totalProfit').innerText = totalProfit + " ج.م";
        document.getElementById('bestSeller').innerText = maxSold > 0 ? `${bestItem} (${maxSold})` : "لا يوجد";
    }

    checkAuthState();
</script>

</body>
</html>
